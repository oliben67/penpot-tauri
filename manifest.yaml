app-id: com.github.oliben67.penpot-tauri
runtime: org.freedesktop.Platform
runtime-version: '21.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "21.08"
command: penpot-tauri.sh
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node16
finish-args:
  - --share=ipc
  - --socket=x11
  - --share=network
  - --filesystem=xdg-download
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/node16/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
modules:
  - name: penpot
    buildsystem: simple
    build-options:
        env:
          XDG_CACHE_HOME: /run/build/penpot-tauri/flatpak-node/cache
        build-args:
        - --share=network
    build-commands:
    - yarn
    - mkdir penpot
    - yarn electron-packager ./ penpot --platform=linux --arch=x64 --electron-version=15.4.1 --out=penpot/
    - mkdir /app/main
    - cp -R penpot/penpot-linux-x64/* /app/main
    - install -D -t /app/bin penpot-tauri.sh
    - install -D -t /app/share/applications flatpak/com.github.oliben67.penpot-tauri.desktop
    - install -D -t /app/share/metainfo flatpak/com.github.oliben67.penpot-tauri.metainfo.xml
    - install -D -t /app/share/icons/hicolor/128x128/apps flatpak/icons/com.github.oliben67.penpot-tauri_i.png
    sources:
      - type: archive
        url: https://github.com/oliben67/penpot-tauri/archive/refs/tags/0.2.3.tar.gz
        sha256: d7f03976aaf84ae92683ed98e48eb05dbe1787f5bfd35241f302db52973096a2
      - type: script
        dest-filename: penpot-tauri.sh
        commands:
          - zypak-wrapper.sh /app/main/penpot "$@"
