app-id: com.github.oliben67.penpot-tauri
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: penpot-tauri
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-download
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/penpot-tauri/cargo
modules:
  - name: penpot-tauri
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/penpot-tauri/cargo
    build-commands:
      - cd src && cargo tauri build --bundles none
      - install -Dm755 src/target/release/penpot /app/bin/penpot-tauri
      - install -Dm644 flatpak/com.github.oliben67.penpot-tauri.desktop /app/share/applications/com.github.oliben67.penpot-tauri.desktop
      - install -Dm644 flatpak/com.github.oliben67.penpot-tauri.metainfo.xml /app/share/metainfo/com.github.oliben67.penpot-tauri.metainfo.xml
      - install -Dm644 flatpak/icons/com.github.oliben67.penpot-tauri.png /app/share/icons/hicolor/128x128/apps/com.github.oliben67.penpot-tauri.png
    sources:
      - type: archive
        url: https://github.com/oliben67/penpot-tauri/archive/refs/tags/v1.0.0.tar.gz
        sha256: FIXME
