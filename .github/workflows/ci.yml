name: penpot-tauri

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --manifest-path src/Cargo.toml -- --check

      - name: Clippy lint
        run: cargo clippy --manifest-path src/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src/Cargo.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build release
        working-directory: src
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: penpot-tauri-linux
          path: |
            src/target/release/bundle/deb/*.deb
            src/target/release/bundle/rpm/*.rpm
            src/target/release/bundle/appimage/*.AppImage
